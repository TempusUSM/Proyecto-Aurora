name: aurora_mobile
description: A new Flutter project.

publish_to: 'none'           

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.1              
  device_info_plus: ^10.1.0
  shared_preferences: ^2.2.3
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/skins/
    - assets/images/aurora_logo.png
    - assets/skins/aurora_azul.png
    - assets/skins/aurora_noche.png
    - assets/skins/aurora_prisma.png
    - assets/skins/aurora_clasica.png
